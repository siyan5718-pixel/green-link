<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绿链汇管理后台 - 登录</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #00A86B20, #0F4C8120); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; }
    .title { text-align: center; font-size: 24px; color: #00A86B; margin-bottom: 30px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
    .input-group input:focus { outline: none; border-color: #00A86B; }
    .btn { width: 100%; padding: 14px; background: #00A86B; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    .btn:hover { background: #009960; }
    .error { color: red; text-align: center; margin-top: 10px; display: none; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="title">绿链汇管理后台</div>
    
    <form id="login-form">
      <div class="input-group">
        <label>账号</label>
        <input type="text" id="username" placeholder="请输入账号" required>
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
      </div>
      <div class="error" id="error">账号或密码错误</div>
      <button type="submit" class="btn">登 录</button>
    </form>
  </div>

  <script>
    var ADMIN_USER = "admin";
    var ADMIN_PASS = "zhupeiyu";

    if (localStorage.getItem('admin_logged_in') === 'true') {
      location.href = 'main.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var user = document.getElementById('username').value;
      var pass = document.getElementById('password').value;
      var error = document.getElementById('error');
      
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        localStorage.setItem('admin_logged_in', 'true');
        location.href = 'main.html';
      } else {
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
