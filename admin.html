<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绿链汇 - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
    .login-box h2 { text-align: center; margin-bottom: 30px; color: #333; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; }
    .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s; }
    .input-group input:focus { border-color: #00A86B; }
    .login-btn { width: 100%; padding: 14px; background: #00A86B; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.3s; }
    .login-btn:hover { background: #008f5c; }
    .login-btn:disabled { background: #ccc; cursor: not-allowed; }
    .error-msg { color: #ff4d4f; font-size: 13px; text-align: center; margin-top: 15px; }
    .hidden { display: none !important; }
    /* 管理内容区 */
    .admin-content { width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .admin-header h2 { color: #333; }
    .logout-btn { padding: 8px 16px; background: #ff4d4f; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 10px 20px; border: none; border-radius: 6px; background: #eee; cursor: pointer; }
    .tab-btn.active { background: #00A86B; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .operate-btn { padding: 8px 16px; background: #00A86B; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 15px; }
  </style>
</head>
<body>
  <!-- 登录区 -->
  <div id="loginArea" class="login-box">
    <h2>绿链汇管理后台</h2>
    <div class="input-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名">
    </div>
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="login-btn" id="loginBtn">登录</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 管理内容区（默认隐藏） -->
  <div id="adminContent" class="admin-content hidden">
    <div class="admin-header">
      <h2>欢迎回来，管理员</h2>
      <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="newsTab">公众号新闻管理</button>
      <button class="tab-btn" data-tab="tipsTab">操作提示</button>
    </div>
    <!-- 新闻管理 -->
    <div id="newsTab" class="tab-content active">
      <button class="operate-btn" id="updateNewsBtn">手动更新公众号最新10条新闻</button>
      <div id="newsResult" class="empty">点击上方按钮更新新闻</div>
    </div>
    <!-- 操作提示 -->
    <div id="tipsTab" class="tab-content">
      <div style="line-height: 2; color: #666; font-size: 14px;">
        <p>✅ 用户名/密码：admin / 123456（可在代码中自行修改）</p>
        <p>✅ 点击「手动更新新闻」将直接调用云函数抓取公众号最新内容</p>
        <p>✅ 用户留言可在「云开发控制台→数据库→message」中查看</p>
        <p>✅ 新闻数据可在「云开发控制台→数据库→wechatArticles」中查看</p>
        <p>⚠️ 请妥善保管后台地址，不要对外泄露</p>
      </div>
    </div>
  </div>

  <script>
    // ====================== 可自定义修改管理员账号密码 ======================
    const ADMIN_USER = "admin";
    const ADMIN_PWD = "zhupeiyu";
    // ====================== 替换成你的云开发环境ID ======================
    const envId = "cloud1-9gokdyng87192870"; // 示例：xxx-123456
    // ======================================================================

    // DOM元素
    const loginArea = document.getElementById('loginArea');
    const adminContent = document.getElementById('adminContent');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const logoutBtn = document.getElementById('logoutBtn');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    const updateNewsBtn = document.getElementById('updateNewsBtn');
    const newsResult = document.getElementById('newsResult');

    // 登录逻辑（纯前端校验，无SDK）
    loginBtn.addEventListener('click', () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      
      if (username !== ADMIN_USER || password !== ADMIN_PWD) {
        errorMsg.textContent = '用户名或密码错误';
        return;
      }
      
      // 登录成功，存储状态并显示后台
      localStorage.setItem('adminLogin', 'true');
      loginArea.classList.add('hidden');
      adminContent.classList.remove('hidden');
      errorMsg.textContent = '';
    });

    // 退出登录
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('adminLogin');
      window.location.reload();
    });

    // 标签页切换
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    // 手动更新新闻（直接调用云函数接口，无SDK）
    updateNewsBtn.addEventListener('click', async () => {
      updateNewsBtn.disabled = true;
      updateNewsBtn.textContent = '更新中...';
      newsResult.innerHTML = '<div class="empty">正在抓取公众号最新新闻，请稍候...</div>';
      
      try {
        // 直接调用微信云开发云函数接口
        const res = await fetch(`https://${envId}.service.tcloudbase.com/getWechatArticles`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const result = await res.json();
        
        if (result.code === 0) {
          newsResult.innerHTML = `<div style="color: #00A86B; text-align: center; padding: 40px;">✅ 新闻更新成功！共抓取${result.data.length}条公众号最新内容</div>`;
        } else {
          newsResult.innerHTML = `<div style="color: #ff4d4f; text-align: center; padding: 40px;">❌ 更新失败：${result.msg || '未知错误'}</div>`;
        }
      } catch (err) {
        newsResult.innerHTML = `<div style="color: #ff4d4f; text-align: center; padding: 40px;">❌ 网络错误：${err.message}</div>`;
      } finally {
        updateNewsBtn.disabled = false;
        updateNewsBtn.textContent = '手动更新公众号最新10条新闻';
      }
    });

    // 页面加载检查登录状态
    window.onload = () => {
      if (localStorage.getItem('adminLogin') === 'true') {
        loginArea.classList.add('hidden');
        adminContent.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
