<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绿链汇管理后台 - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #00A86B; }
    body { background: linear-gradient(135deg, #00A86B20, #0F4C8120); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <i class="fas fa-leaf text-4xl text-primary"></i>
      <h1 class="text-2xl font-bold mt-4">绿链汇管理后台</h1>
      <p class="text-gray-500 text-sm mt-2">请输入账号密码登录</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">账号</label>
        <input type="text" id="username" class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="请输入账号" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">密码</label>
        <input type="password" id="password" class="w-full border rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="请输入密码" required>
      </div>
      <div id="error-msg" class="text-red-500 text-sm hidden"></div>
      <button type="submit" class="w-full bg-primary text-white py-3 rounded font-medium hover:bg-primary/90">
        登录
      </button>
    </form>

  </div>

  <script>
    // 登录配置 - 可以修改
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "zhupeiyu";

    // 检查是否已登录
    if (localStorage.getItem('admin_logged_in') === 'true') {
      window.location.href = 'main.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error-msg');
      
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        localStorage.setItem('admin_logged_in', 'true');
        window。location.href = 'main.html';
      } else {
        error.textContent = '账号或密码错误';
        error.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
