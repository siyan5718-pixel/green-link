<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绿链汇管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #00A86B; }
    。sidebar { width: 220px; }
    。main-content { margin-left: 220px; }
    。sidebar a { color: #1f2937; font-weight: 500; }
    。sidebar a:hover { background: #bbf7d0; }
    。sidebar .fas, .sidebar .fab { color: #15803d; }
    @media (max-width: 768px) {
      。sidebar { display: none; }
      。main-content { margin-left: 0; }
    }
  </style>
</head>
<body class="bg-gray-100">

  <!-- 侧边栏 -->
  <aside class="sidebar fixed left-0 top-0 h-full bg-green-100 text-gray-800 p-4" style="border-right: 3px solid #00A86B;">
    <div class="text-xl font-bold mb-6 text-green-800">
      <i class="fas fa-leaf text-primary"></i> 绿链汇后台
    </div>
    <nav class="space-y-1">
      <a href="#" class="nav-item block py-2 px-3 rounded hover:bg-green-200 text-gray-800" data-page="dashboard">
        <i class="fas fa-home w-5 text-green-700"></i> 控制台
      </a>
      <a href="#" class="nav-item block py-2 px-3 rounded hover:bg-green-200 text-gray-800" data-page="news">
        <i class="fas fa-newspaper w-5 text-green-700"></i> 新闻管理
      </a>
      <a href="#" class="nav-item block py-2 px-3 rounded hover:bg-green-200 text-gray-800" data-page="messages">
        <i class="fas fa-comments w-5 text-green-700"></i> 客户留言
      </a>
      <a href="#" class="nav-item block py-2 px-3 rounded hover:bg-green-200 text-gray-800" data-page="wechat">
        <i class="fab fa-weixin w-5 text-green-700"></i> 公众号文章
      </a>
      <a href="#" onclick="logout()" class="block py-2 px-3 rounded hover:bg-red-100 text-red-600 mt-4">
        <i class="fas fa-sign-out-alt w-5"></i> 退出登录
      </a>
    </nav>
  </aside>

  <!-- 主内容 -->
  <main class="main-content p-6">
    
    <!-- 控制台 -->
    <section id="page-dashboard" class="page-section">
      <h1 class="text-2xl font-bold mb-6">控制台</h1>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white p-4 rounded-lg shadow">
          <div class="text-gray-500 text-sm">新闻总数</div>
          <div class="text-2xl font-bold text-primary" id="news-count">-</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow">
          <div class="text-gray-500 text-sm">留言总数</div>
          <div class="text-2xl font-bold text-blue-500" id="msg-count">-</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow">
          <div class="text-gray-500 text-sm">未读留言</div>
          <div class="text-2xl font-bold text-orange-500" id="unread-count">-</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow">
          <div class="text-gray-500 text-sm">公众号文章</div>
          <div class="text-2xl font-bold text-green-500" id="wechat-count">-</div>
        </div>
      </div>
      
      <div class="mt-6 bg-white rounded-lg p-4 shadow">
        <h3 class="font-bold mb-3">使用说明</h3>
        <ul class="text-sm text-gray-600 space-y-2">
          <li>• <b>新闻管理</b>：手动添加新闻到官网显示</li>
          <li>• <b>客户留言</b>：查看官网客户的留言</li>
          <li>• <b>公众号文章</b>：手动添加公众号文章链接</li>
        </ul>
      </div>
    </section>

    <!-- 新闻管理 -->
    <section id="page-news" class="page-section hidden">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">新闻管理</h1>
        <button onclick="showNewsModal()" class="bg-primary text-black px-4 py-2 rounded hover:bg-primary/80">
          <i class="fas fa-plus mr-1"></i>添加新闻
        </button>
      </div>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-sm">标题</th>
              <th class="px-4 py-3 text-left text-sm">链接</th>
              <th class="px-4 py-3 text-left text-sm">发布时间</th>
              <th class="px-4 py-3 text-left text-sm">操作</th>
            </tr>
          </thead>
          <tbody id="news-table"></tbody>
        </table>
      </div>
    </section>

    <!-- 留言管理 -->
    <section id="page-messages" class="page-section hidden">
      <h1 class="text-2xl font-bold mb-4">客户留言</h1>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-sm">姓名</th>
              <th class="px-4 py-3 text-left text-sm">电话</th>
              <th class="px-4 py-3 text-left text-sm">企业</th>
              <th class="px-4 py-3 text-left text-sm">内容</th>
              <th class="px-4 py-3 text-left text-sm">时间</th>
              <th class="px-4 py-3 text-left text-sm">操作</th>
            </tr>
          </thead>
          <tbody id="messages-table"></tbody>
        </table>
      </div>
    </section>

    <!-- 公众号文章 -->
    <section id="page-wechat" class="page-section hidden">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">公众号文章</h1>
        <div class="space-x-2">
          <button onclick="syncWechat()" class="bg-blue-600 text-black px-4 py-2 rounded hover:bg-blue-700">
            <i class="fas fa-sync mr-1"></i>一键同步
          </button>
          <button onclick="showWechatModal()" class="bg-blue-600 text-black px-4 py-2 rounded hover:bg-blue-700">
            <i class="fas fa-plus mr-1"></i>手动添加
          </button>
        </div>
      </div>
      <p class="text-gray-500 text-sm mb-4">点击「一键同步」调用云函数获取公众号文章，或点击「手动添加」</p>
      <div id="sync-status" class="mb-4 text-sm"></div>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-sm">标题</th>
              <th class="px-4 py-3 text-left text-sm">链接</th>
              <th class="px-4 py-3 text-left text-sm">添加时间</th>
              <th class="px-4 py-3 text-left text-sm">操作</th>
            </tr>
          </thead>
          <tbody id="wechat-table"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- 新闻弹窗 -->
  <div id="news-modal" class="fixed inset-0 bg-primary/30 hidden items-center justify-center z-50">
    <div class="bg-green-50 rounded-lg p-6 w-full max-w-md border-2 border-primary">
      <h2 class="text-lg font-bold mb-4 text-gray-800">添加新闻</h2>
      <form id="news-form" class="space-y-3">
        <div>
          <label class="block text-sm mb-1 text-gray-800">新闻标题 *</label>
          <input type="text" id="news-title" class="w-full border rounded px-3 py-2 text-gray-800" required>
        </div>
        <div>
          <label class="block text-sm mb-1 text-gray-800">文章链接</label>
          <input type="url" id="news-link" class="w-full border rounded px-3 py-2 text-gray-800" placeholder="https://...">
        </div>
        <div class="flex gap-2 justify-end pt-2">
          <button type="button" onclick="hideNewsModal()" class="px-4 py-2 border rounded bg-gray-600 text-white hover:bg-gray-700">取消</button>
          <button type="submit" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 公众号文章弹窗 -->
  <div id="wechat-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <h2 class="text-lg font-bold mb-4 text-gray-800">添加公众号文章</h2>
      <form id="wechat-form" class="space-y-3">
        <div>
          <label class="block text-sm mb-1 text-gray-800">文章标题 *</label>
          <input type="text" id="wechat-title" class="w-full border rounded px-3 py-2 text-gray-800" required>
        </div>
        <div>
          <label class="block text-sm mb-1 text-gray-800">文章链接 *</label>
          <input type="url" id="wechat-url" class="w-full border rounded px-3 py-2 text-gray-800" placeholder="https://mp.weixin.qq.com/..." required>
        </div>
        <div class="flex gap-2 justify-end pt-2">
          <button type="button" onclick="hideWechatModal()" class="px-4 py-2 border rounded bg-gray-600 text-white hover:bg-gray-700">取消</button>
          <button type="submit" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 引入微信云开发SDK -->
  <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>

  <script>
    // 检查登录状态
    if (localStorage.getItem('admin_logged_in') !== 'true') {
      window.location.href = 'login.html';
    }

    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('admin_logged_in');
        window.location.href = 'login.html';
      }
    }

    // 本地存储数据管理
    const STORAGE_KEY = 'lv_lianhui_data';
    
    function getData() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        return JSON.parse(data);
      }
      return {
        news: [],
        messages: [],
        wechat: []
      };
    }
    
    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // 导航
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const page = item.dataset.page;
        showPage(page);
      });
    });

    function showPage(page) {
      document。querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
      document.getElementById('page-' + page).classList.remove('hidden');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('bg-green-300'));
      document.querySelector(`[data-page="${page}"]`).classList.add('bg-green-300');
      
      if (page === 'dashboard') loadDashboard();
      if (page === 'news') loadNews();
      if (page === 'messages') loadMessages();
      if (page === 'wechat') loadWechat();
    }

    // 加载控制台
    function loadDashboard() {
      const data = getData();
      document.getElementById('news-count').textContent = data.news.length;
      document.getElementById('msg-count').textContent = data.messages.length;
      document.getElementById('wechat-count').textContent = data.wechat.length;
      const unread = data.messages.filter(m => m.status === 'unread').length;
      document.getElementById('unread-count').textContent = unread;
    }

    // 加载新闻
    function loadNews() {
      const data = getData();
      const tbody = document.getElementById('news-table');
      if (!data.news.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">暂无新闻，点击上方添加</td></tr>';
        return;
      }
      tbody.innerHTML = data.news.map((item, i) => `
        <tr class="border-t">
          <td class="px-4 py-3">${item.title}</td>
          <td class="px-4 py-3 text-sm text-blue-500 truncate max-w-xs">${item.link || '-'}</td>
          <td class="px-4 py-3 text-sm">${item.time}</td>
          <td class="px-4 py-3">
            <button onclick="deleteNews(${i})" class="text-red-500 text-sm">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 加载留言
    function loadMessages() {
      const data = getData();
      const tbody = document.getElementById('messages-table');
      if (!data.messages.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">暂无留言</td></tr>';
        return;
      }
      tbody.innerHTML = data.messages.map((item, i) => `
        <tr class="border-t">
          <td class="px-4 py-3">${item.name}</td>
          <td class="px-4 py-3">${item.phone}</td>
          <td class="px-4 py-3">${item.company || '-'}</td>
          <td class="px-4 py-3 max-w-xs truncate">${item.message}</td>
          <td class="px-4 py-3 text-sm">${item.time}</td>
          <td class="px-4 py-3">
            <button onclick="deleteMessage(${i})" class="text-red-500 text-sm">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 加载公众号文章
    function loadWechat() {
      const data = getData();
      const tbody = document.getElementById('wechat-table');
      if (!data.wechat.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">暂无文章，点击上方添加</td></tr>';
        return;
      }
      tbody.innerHTML = data.wechat.map((item, i) => `
        <tr class="border-t">
          <td class="px-4 py-3">${item.title}</td>
          <td class="px-4 py-3 text-blue-500 text-sm truncate max-w-xs">${item.url}</td>
          <td class="px-4 py-3 text-sm">${item.time}</td>
          <td class="px-4 py-3">
            <a href="${item.url}" target="_blank" class="text-blue-500 text-sm mr-2">查看</a>
            <button onclick="deleteWechat(${i})" class="text-red-500 text-sm">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 添加新闻
    function showNewsModal() {
      document.getElementById('news-modal').classList.remove('hidden');
      document.getElementById('news-modal').classList.add('flex');
    }
    function hideNewsModal() {
      document.getElementById('news-modal').classList.add('hidden');
      document.getElementById('news-modal').classList.remove('flex');
    }
    
    document.getElementById('news-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = getData();
      data.news.unshift({
        title: document.getElementById('news-title').value,
        link: document.getElementById('news-link').value,
        time: new Date().toLocaleDateString()
      });
      saveData(data);
      hideNewsModal();
      loadNews();
      loadDashboard();
      alert('添加成功');
    });

    function deleteNews(i) {
      if (!confirm('确定删除？')) return;
      const data = getData();
      data.news.splice(i, 1);
      saveData(data);
      loadNews();
      loadDashboard();
    }

    // 添加公众号文章
    function showWechatModal() {
      document.getElementById('wechat-modal').classList.remove('hidden');
      document.getElementById('wechat-modal').classList.add('flex');
    }
    function hideWechatModal() {
      document.getElementById('wechat-modal').classList.add('hidden');
      document.getElementById('wechat-modal').classList.remove('flex');
    }
    
    document.getElementById('wechat-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = getData();
      data.wechat.unshift({
        title: document.getElementById('wechat-title').value,
        url: document.getElementById('wechat-url').value,
        time: new Date().toLocaleDateString()
      });
      saveData(data);
      hideWechatModal();
      loadWechat();
      loadDashboard();
      alert('添加成功');
    });

    function deleteWechat(i) {
      if (!confirm('确定删除？')) return;
      const data = getData();
      data.wechat.splice(i, 1);
      saveData(data);
      loadWechat();
      loadDashboard();
    }

    function deleteMessage(i) {
      if (!confirm('确定删除？')) return;
      const data = getData();
      data.messages.splice(i, 1);
      saveData(data);
      loadMessages();
      loadDashboard();
    }

    // 一键同步公众号文章（调用云函数）
    function syncWechat() {
      const statusEl = document.getElementById('sync-status');
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
      
      statusEl.innerHTML = '<span class="text-gray-500">正在调用云函数，请稍候...</span>';
      
      // 尝试调用云函数
      if (typeof cloud !== 'undefined') {
        try {
          const cld = cloud.init({ env: 'cloud1-9gokdyng87192870' });
          cld.callFunction({
            name: 'getWechatArticles',
            success: function(res) {
              console.log('云函数返回:', res);
              if (res.result && res.result.code === 0) {
                // 将云函数返回的文章同步到本地存储
                const data = getData();
                data.wechat = res.result.data.map(item => ({
                  title: item.title,
                  url: item.url,
                  time: new Date().toLocaleDateString()
                }));
                saveData(data);
                statusEl.innerHTML = '<span class="text-green-600">✓ 同步成功！共获取' + res.result.data.length + '篇文章</span>';
                loadWechat();
                loadDashboard();
              } else {
                statusEl.innerHTML = '<span class="text-red-500">✗ 同步失败：' + (res.result ? res.result.msg : '未知错误') + '</span>';
              }
              btn.disabled = false;
              btn.innerHTML = '<i class="fas fa-sync mr-1"></i>一键同步';
            },
            fail: function(err) {
              console.error('调用失败:', err);
              statusEl.innerHTML = '<span class="text-red-500">✗ 调用失败：' + err.message + '</span><br><span class="text-gray-500 text-sm">请确保云函数已部署，或使用手动添加</span>';
              btn.disabled = false;
              btn.innerHTML = '<i class="fas fa-sync mr-1"></i>一键同步';
            }
          });
        } catch(e) {
          console.error(e);
          statusEl.innerHTML = '<span class="text-red-500">✗ 初始化失败：' + e.message + '<br>请使用手动添加文章</span>';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sync mr-1"></i>一键同步';
        }
      } else {
        statusEl.innerHTML = '<span class="text-red-500">✗ 云开发SDK未加载<br>请使用手动添加文章</span>';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync mr-1"></i>一键同步';
      }
    }

    // 默认加载控制台
    loadDashboard();
  </script>
</body>
</html>
